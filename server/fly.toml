# fly.toml app configuration file generated for tulip-garden-api on 2026-03-06T14:14:21-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tulip-garden-api'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  DATABASE_PATH = '/data/tulip_garden.db'

[mounts]
  source = 'tulip_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
